<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D FlipBook Demo</title>
  <link rel="stylesheet" href="https://unpkg.com/page-flip/dist/page-flip.min.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      margin: 0;
      padding: 40px 0;
    }
    #flipbook-container {
      width: 800px;
      height: 550px;
      margin: 0 auto;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }
    @media (max-width: 850px) {
      #flipbook-container {
        width: 95vw;
        height: 60vh;
      }
    }
  </style>
</head>
<body>
  <h1>3D FlipBook Demo (PageFlip.js)</h1>
  <div id="flipbook-container"></div>

  <script src="https://unpkg.com/page-flip/dist/page-flip.browser.min.js"></script>
  <script>
    // Example: load from images
    const images = [
      "https://picsum.photos/seed/1/800/1100",
      "https://picsum.photos/seed/2/800/1100",
      "https://picsum.photos/seed/3/800/1100",
      "https://picsum.photos/seed/4/800/1100"
    ];

    const flipbook = new window.PageFlip(
      document.getElementById("flipbook-container"),
      {
        width: 400, // base page width
        height: 550, // base page height
        size: "stretch",
        maxShadowOpacity: 0.5,
        showCover: true,
        mobileScrollSupport: false
      }
    );

    flipbook.loadFromImages(images);
  </script>
</body>
</html>
